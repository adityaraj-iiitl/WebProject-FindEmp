spring.application.name=FindEmp
server.port=${PORT:8080}

# Database Configuration (Works for both Local and Railway)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:myappdb}?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:myuser}
spring.datasource.password=${MYSQLPASSWORD:StrongPassword123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

